name: ci

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"
          cache: true

      - name: Go mod tidy
        run: go mod tidy

      - name: Go vet
        run: go vet ./...

      - name: Go test
        run: go test ./... -count=1 -timeout 300s

      - name: Go build
        run: go build ./...
        env:
          CGO_ENABLED: 0

  integration:
    needs: unit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.13"
          cache: true

      - name: Client/Server integration tests
        run: go test -tags=integration ./server ./client/command/listener ./client/command/pipeline ./client/command/website ./client/command/sessions ./client/command/context -count=1 -timeout 300s
